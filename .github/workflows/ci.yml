name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'codex/**'
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript syntax
        run: |
          node --check cypress.config.js
          node --check cypress/support/commands.js
          node --check cypress/e2e/api/users.cy.js
          node --check cypress/e2e/api/negative.cy.js
          node --check cypress/e2e/web/auth.cy.js

      - name: Run API tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          spec: cypress/e2e/api/**/*.cy.js
